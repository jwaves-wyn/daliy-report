<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Genians 일일 업무보고서 자동 생성기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-shell">
    <header class="masthead">
      <div class="brand-chip">
        <span class="brand-chip__label">Genians</span>
      </div>
      <div class="masthead__copy">
        <p class="eyebrow">일일 업무보고서 자동 생성</p>
        <h1>Genians 일일 업무보고서 자동 생성기</h1>
        <p class="subtext">메신저 대화와 JIRA 업무 데이터를 바탕으로 보고서 초안을 만드는 실습용 화면입니다.</p>
      </div>
      <div class="masthead__status">
        <div class="masthead__status-row">
          <span class="status-pill status-pill--warm">샘플 모드</span>
          <span id="api-key-status" class="status-pill">API Key 미설정</span>
        </div>
        <label class="key-card">
          <span class="key-card__label">OpenAI API Key 입력 영역</span>
          <input id="api-key-input" type="password" class="field__control key-card__input" placeholder="OpenAI API Key를 입력하세요" />
          <div class="key-card__buttons">
            <button id="save-api-key" class="button button--amber button--compact" type="button">API Key 저장</button>
            <button id="delete-api-key" class="button button--outline button--compact" type="button">API Key 삭제</button>
          </div>
        </label>
      </div>
    </header>

    <main class="workspace">
      <section class="panel panel--form">
        <div class="panel__bar">
          <span class="panel__title">입력 영역</span>
          <span class="panel__hint">필요한 내용을 차례대로 넣어주세요</span>
        </div>

        <div class="field-grid">
          <label class="field">
            <span class="field__label">작성일 입력 영역</span>
            <input id="report-date" type="date" class="field__control" />
          </label>
        </div>

        <label class="field field--stack">
          <span class="field__label">메신저 대화 내용 입력 영역</span>
          <textarea id="messenger-input" class="field__control field__control--textarea" rows="12" placeholder="메신저 대화 내용을 붙여넣어 주세요."></textarea>
        </label>

        <label class="field field--stack">
          <span class="field__label">JIRA 업무 데이터 입력 영역</span>
          <textarea id="jira-input" class="field__control field__control--textarea" rows="12" placeholder="JIRA CSV 데이터를 붙여넣어 주세요."></textarea>
        </label>

        <div class="button-row">
          <button id="load-sample" class="button button--amber" type="button">샘플 데이터 불러오기</button>
          <button id="generate-report" class="button button--signal" type="button">로컬 샘플 보고서 생성</button>
          <button id="generate-ai-report" class="button button--signal" type="button">AI 보고서 생성</button>
        </div>
      </section>

      <section class="panel panel--output">
        <div class="panel__bar">
          <span class="panel__title">보고서 출력 영역</span>
          <span class="panel__hint">보고서 생성 방식: 로컬 샘플 생성</span>
        </div>

        <p class="output-note">로컬 샘플 보고서는 API Key 없이 실행할 수 있습니다.</p>
        <div id="report-output" class="report-output" aria-live="polite">
          <div class="report-placeholder">보고서를 생성하면 결과가 여기에 표시됩니다.</div>
        </div>

        <div class="report-meta">
          <div id="report-status" class="report-status">상태: 대기 중</div>
          <div id="report-generated-at" class="report-generated-at">보고서 생성 시각: -</div>
        </div>

        <div class="button-row button-row--split">
          <button id="copy-report" class="button button--dark" type="button">보고서 복사</button>
          <button id="download-report" class="button button--amber" type="button">TXT로 다운로드</button>
          <button id="reset-form" class="button button--outline" type="button">초기화</button>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
